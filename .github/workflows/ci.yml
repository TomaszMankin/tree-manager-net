name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: pwsh
        run: dotnet restore TreeManager.sln

      - name: Build
        shell: pwsh
        run: dotnet build TreeManager.sln --configuration Release --no-restore

      - name: L0 tests
        uses: ./.github/actions/run-test-tier
        with:
          tier: L0

      - name: L1 tests
        if: success()
        uses: ./.github/actions/run-test-tier
        with:
          tier: L1

      - name: L2 tests (stub)
        if: false  # toggle to true once headed WPF suite exists (sprint-20)
        uses: ./.github/actions/run-test-tier
        with:
          tier: L2

      - name: e2e tests (stub)
        if: false  # toggle to true once e2e suite exists
        uses: ./.github/actions/run-test-tier
        with:
          tier: e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
